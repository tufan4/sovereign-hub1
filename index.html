<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOVEREIGN | Askeri Eğitim Platformu</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Host+Grotesk:wght@300;400;700&family=Outfit:wght@600;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-camo: #050505;
            --panel: #0a0a0c;
            --border: #1a1a20;
            --accent: #d4af37;
            /* Gold/Yellow */
            --accent-hover: #f3c22b;
            --text: #e8e8e8;
            --dim: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Host Grotesk', sans-serif;
            background: var(--bg-camo);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Space background pseudo-element */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-camo);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- SCANLINE & HUD EFFECTS --- */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.3;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.9);
            z-index: 10000;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100%);
            }
        }

        .scanline-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.05), transparent);
            opacity: 0.5;
            z-index: 10001;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        /* --- VIEWPORT --- */
        main {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            z-index: 5;
            width: 100%;
        }

        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            z-index: 10002;
            box-shadow: 0 0 15px var(--accent);
        }

        .iframe-wrapper {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-camo);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }

        iframe.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body class="military-hud">
    <div id="loader"></div>
    <div class="vignette"></div>
    <div class="scanline-bar"></div>

    <main>
        <div class="iframe-wrapper">
            <iframe id="content-frame" class="active"></iframe>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const frame = document.getElementById('content-frame');
        const loader = document.getElementById('loader');

        function loadPage(url) {
            loader.style.transform = 'scaleX(0.5)';
            frame.style.opacity = '0';
            setTimeout(() => { frame.src = url; }, 50);

            frame.onload = () => {
                loader.style.transform = 'scaleX(1)';
                setTimeout(() => {
                    frame.style.opacity = '1';
                    loader.style.transform = 'scaleX(0)';
                }, 200);
            };
        }

        window.onload = () => {
            // Başlangıçta anasayfayı yükle
            loadPage('home.html');
        };

        // Iframe içinden sayfayı değiştirmek için global bir fonksiyon
        window.changePageFromIframe = function (url) {
            loadPage(url);
        };
    </script>
</body>

</html>
